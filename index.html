<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Калькулятор дельти ОЗС</title>

  <style>
    :root {
      --blue: #123b7a;
      --red: #d71920;
      --border: #d9e2ec;
      --text: #1f2937;
      --muted: #6b7280;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #eef3f8;
      color: var(--text);
    }

    .app {
      height: 100dvh;
      padding: 10px;
      display: grid;
      grid-template-rows: auto 1fr;
      max-width: 500px;
      margin: auto;
      gap: 10px;
    }

    .header {
      background: var(--blue);
      color: white;
      border-radius: var(--radius);
      padding: 12px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 22px;
    }

    .card {
      background: white;
      border-radius: var(--radius);
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .label {
      font-weight: bold;
      font-size: 14px;
    }

    input {
      width: 100%;
      height: 60px;
      font-size: 24px;
      font-weight: bold;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 0 10px;
    }

    button {
      height: 60px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 12px;
      border: none;
      background: var(--red);
      color: white;
      cursor: pointer;
    }

    .result {
      border-radius: var(--radius);
      padding: 10px;
      text-align: center;
      background: #f5f7fa;
    }

    .percent {
      font-size: 40px;
      font-weight: bold;
    }

    .delta {
      font-size: 22px;
      font-weight: bold;
    }

    .note {
      margin-top: 5px;
      font-size: 14px;
      font-weight: bold;
    }

    .success { background: #eef8f1; color: #166534; }
    .warning { background: #fff7e8; color: #9a6700; }
    .danger { background: #fdeeee; color: #b42318; }
  </style>
</head>

<body>

<div class="app">

  <div class="header">
    <h1>Калькулятор дельти ОЗС</h1>
  </div>

  <div class="card">

    <div>
      <div class="label">ОЗС до лікування препаратом Урорек</div>
      <input id="before" type="number" placeholder="120">
    </div>

    <div>
      <div class="label">ОЗС після лікування препаратом Урорек</div>
      <input id="after" type="number" placeholder="40">
    </div>

    <button onclick="calculate()">Розрахувати</button>

    <div id="result" class="result">
      <div id="percent" class="percent">— %</div>
      <div id="delta" class="delta">Δ: — мл</div>
      <div id="note" class="note"></div>
    </div>

  </div>
</div>

<script>
function calculate() {
  const before = parseFloat(document.getElementById('before').value);
  const after = parseFloat(document.getElementById('after').value);

  if (!before || before <= 0) return;

  const deltaMl = before - after;
  const deltaPercent = (deltaMl / before) * 100;

  const percentEl = document.getElementById('percent');
  const deltaEl = document.getElementById('delta');
  const noteEl = document.getElementById('note');
  const resultEl = document.getElementById('result');

  percentEl.textContent = deltaPercent.toFixed(1) + '%';
  deltaEl.textContent = 'Δ: ' + deltaMl.toFixed(1) + ' мл';

  let note = '';
  let className = 'result';

  if (deltaMl < 0) {
    note = 'ОЗС збільшився';
    className += ' danger';
  } else if (deltaPercent >= 50) {
    note = 'Виражене зниження ОЗС';
    className += ' success';
  } else if (deltaPercent >= 30) {
    note = 'Помірне зниження ОЗС';
    className += ' warning';
  } else {
    note = 'Незначне зниження ОЗС';
    className += ' danger';
  }

  noteEl.textContent = note;
  resultEl.className = className;
}
</script>

</body>
</html>
