<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Калькулятор дельти ОЗС</title>
  <style>
    :root {
      --blue: #123b7a;
      --blue-dark: #0d2c5c;
      --red: #d71920;
      --bg: #eef3f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d9e2ec;
      --ok-bg: #eef8f1;
      --ok-text: #166534;
      --warn-bg: #fff7e8;
      --warn-text: #9a6700;
      --bad-bg: #fdeeee;
      --bad-text: #b42318;
      --shadow: 0 10px 24px rgba(18, 59, 122, 0.10);
      --radius: 18px;
      --gap: 10px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #edf3f9 0%, #f7fafe 100%);
      color: var(--text);
    }

    body { min-height: 100dvh; }

    .screen {
      min-height: 100dvh;
      height: 100dvh;
      padding: 10px;
      display: grid;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: var(--gap);
      max-width: 520px;
      margin: 0 auto;
      width: 100%;
    }

    .hero {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
      color: #fff;
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(22px, 5.8vw, 30px);
      line-height: 1.1;
      font-weight: 700;
    }

    .hero p {
      margin: 6px 0 0;
      font-size: clamp(13px, 3.5vw, 16px);
      line-height: 1.3;
      color: rgba(255,255,255,0.92);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      display: grid;
      grid-template-rows: auto auto auto auto auto;
      gap: var(--gap);
      min-height: 0;
    }

    .field { display: grid; gap: 6px; }

    .label {
      font-size: clamp(14px, 3.6vw, 16px);
      font-weight: 700;
      color: var(--blue-dark);
    }

    .input-wrap { position: relative; }

    input[type="number"] {
      width: 100%;
      height: clamp(56px, 9vh, 68px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0 52px 0 14px;
      font-size: clamp(22px, 6vw, 28px);
      font-weight: 700;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    .unit {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: clamp(14px, 3.5vw, 16px);
      font-weight: 700;
      color: var(--muted);
    }

    .button-row { display: grid; }

    button {
      height: clamp(54px, 8.5vh, 62px);
      border: 0;
      border-radius: 16px;
      font-size: clamp(18px, 4.8vw, 22px);
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      background: var(--red);
      color: #fff;
    }

    .result {
      border-radius: 18px;
      padding: 12px;
      border: 1px solid var(--border);
      display: grid;
      gap: 6px;
    }

    .result-main { font-size: clamp(34px, 10vw, 50px); font-weight: 700; }
    .result-sub { font-size: clamp(20px, 5.5vw, 28px); font-weight: 700; }

  </style>
</head>
<body>
  <div class="screen">
    <div class="app">
      <div class="hero">
        <h1>Калькулятор дельти ОЗС</h1>
        <p>Введіть значення до та після лікування.</p>
      </div>

      <div class="card">
        <div class="field">
          <label class="label">ОЗС до</label>
          <div class="input-wrap">
            <input id="before" type="number" placeholder="120">
            <span class="unit">мл</span>
          </div>
        </div>

        <div class="field">
          <label class="label">ОЗС після</label>
          <div class="input-wrap">
            <input id="after" type="number" placeholder="40">
            <span class="unit">мл</span>
          </div>
        </div>

        <div class="button-row">
          <button onclick="calculate()">Розрахувати</button>
        </div>

        <div id="result" class="result">
          <div id="percentValue" class="result-main">— %</div>
          <div id="mlValue" class="result-sub">Δ: — мл</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function calculate() {
      const before = parseFloat(document.getElementById('before').value);
      const after = parseFloat(document.getElementById('after').value);

      if (!before || before <= 0) return;

      const deltaMl = before - after;
      const deltaPercent = (deltaMl / before) * 100;

      document.getElementById('percentValue').textContent = deltaPercent.toFixed(1) + '%';
      document.getElementById('mlValue').textContent = 'Δ: ' + deltaMl.toFixed(1) + ' мл';
    }
  </script>
</body>
</html>
